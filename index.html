<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Middlanders Hub</title>
    
    <!-- FIX: Swapped to jsDelivr to bypass unpkg CORS blocks -->
    <script src="https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.2.4/dist/uv.bundle.js" defer></script>
    <script src="./uv.config.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@mercuryworkshop/bare-mux@2.0.3/dist/index.js" defer></script>

    <style>
        :root { --bg: #0f0f11; --panel: #18181b; --accent: #007acc; --border: #27272a; --text: #e4e4e7; --text-muted: #a1a1aa; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        #login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: var(--panel); padding: 40px; border-radius: 12px; border: 1px solid var(--border); text-align: center; width: 340px; }
        .login-box h2 { margin-top: 0; color: #fff; }
        input { width: 90%; margin-bottom: 15px; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: white; outline: none; }
        input:focus { border-color: var(--accent); }
        .checkbox-group { display: flex; justify-content: space-between; padding: 0 5%; margin-bottom: 20px; font-size: 0.85rem; color: var(--text-muted); }
        .btn { width: 100%; padding: 12px; background: var(--border); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .btn:hover { background: #3f3f46; }
        .btn-accent { background: var(--accent); }
        .btn-accent:hover { background: #005999; }
        .btn-danger { background: #990000; margin-top: auto; }
        .btn-danger:hover { background: #cc0000; }

        #sidebar { width: 320px; background: var(--panel); padding: 25px; display: flex; flex-direction: column; gap: 15px; border-right: 1px solid var(--border); flex-shrink: 0; }
        hr { border: 0; border-top: 1px solid var(--border); width: 100%; margin: 10px 0; }
        h3 { margin: 0; font-size: 1rem; color: #fff; display: flex; align-items: center; gap: 8px; }
        
        #main-view { flex-grow: 1; display: flex; flex-direction: column; background: #121212; position: relative;}
        
        #ui-header { background: #202024; border-bottom: 1px solid var(--border); }
        #tab-bar { display: flex; padding: 8px 8px 0 8px; gap: 5px; overflow-x: auto; }
        .tab-btn { background: #000; color: var(--text-muted); border: 1px solid var(--border); border-bottom: none; padding: 8px 15px; border-radius: 8px 8px 0 0; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 0.85rem; max-width: 150px; }
        .tab-btn.active { background: #121212; color: #fff; font-weight: bold; }
        .close-tab { cursor: pointer; border-radius: 50%; padding: 0 5px; }
        .close-tab:hover { background: rgba(255,0,0,0.2); color: red; }
        #add-tab { background: transparent; border: none; color: var(--text); font-size: 1.2rem; cursor: pointer; padding: 0 10px; }
        
        #bookmark-bar { display: flex; padding: 5px 15px; gap: 15px; background: #18181b; font-size: 0.8rem; border-top: 1px solid #27272a; overflow-x: auto;}
        .bookmark-item { color: var(--text-muted); text-decoration: none; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .bookmark-item:hover { color: #fff; }
        .add-bookmark { color: var(--accent); cursor: pointer; font-weight: bold;}

        #browser-wrapper { flex-grow: 1; position: relative; }
        .proxy-iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; background: #fff; }
        .proxy-iframe.active { display: block; }
        
        #home-screen { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #121212; z-index: 10; display: none; }
        #home-screen.active { display: flex; }
        #home-screen h1 { font-size: 3rem; margin-bottom: 30px; letter-spacing: 2px; }
        .search-container { width: 50%; max-width: 600px; position: relative; margin-bottom: 40px;}
        .search-container input { width: 100%; padding: 15px 20px; border-radius: 25px; font-size: 1.1rem; box-sizing: border-box; }
        
        .shortcuts-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 500px; }
        .shortcut { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; padding: 15px; border-radius: 12px; transition: 0.2s; text-decoration: none; color: var(--text); }
        .shortcut:hover { background: #27272a; }
        .shortcut-icon { width: 40px; height: 40px; background: #3f3f46; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; font-weight: bold;}
        .shortcut span { font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>Middlanders Hub</h2>
            <input type="text" id="host-url" placeholder="https://your-tunnel.trycloudflare.com">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <div class="checkbox-group">
                <label><input type="checkbox" id="remember-host"> Save Link</label>
                <label><input type="checkbox" id="remember-me"> Save Login</label>
            </div>
            <button class="btn btn-accent" onclick="auth('login')">Login to Hub</button>
            <button class="btn" onclick="auth('register')">Create Profile</button>
        </div>
    </div>

    <div id="sidebar">
        <h3>Host Seedbox</h3>
        <input type="text" id="magnet-input" placeholder="Paste Magnet Link...">
        <button class="btn" id="magnet-btn">Push to Host PC</button>
        <hr>
        <h3>Host Storage</h3>
        <div id="file-list"></div>
        <button class="btn" id="refresh-btn">Refresh Files</button>
        
        <!-- Logout / Profile Wipe Button -->
        <button class="btn btn-danger" onclick="logout()">Logout & Secure Data</button>
    </div>

    <div id="main-view">
        <div id="ui-header">
            <div id="tab-bar">
                <button id="add-tab" onclick="createTab()">+</button>
            </div>
            <div id="bookmark-bar">
                <span class="add-bookmark" onclick="addBookmark()">+ Add Bookmark</span>
            </div>
        </div>

        <div id="browser-wrapper">
            <div id="home-screen" class="active">
                <h1>MIDDLANDERS</h1>
                <div class="search-container">
                    <input type="text" id="home-search" placeholder="Search the web or type a URL..." onkeypress="handleHomeSearch(event)">
                </div>
                <div class="shortcuts-grid" id="shortcuts-grid"></div>
            </div>
        </div>
    </div>

    <script>
        let currentUserId = null;
        let baseApiUrl = null;
        let tabs = [];
        let tabCounter = 0;
        let activeTabId = null;

        // Default Data
        let bookmarks = JSON.parse(localStorage.getItem('hub_bookmarks')) || [
            { name: "YouTube", url: "https://youtube.com" },
            { name: "GitHub", url: "https://github.com" }
        ];
        let shortcuts = JSON.parse(localStorage.getItem('hub_shortcuts')) || [
            { name: "Discord", url: "https://discord.com" },
            { name: "Reddit", url: "https://reddit.com" },
            { name: "Spotify", url: "https://open.spotify.com" },
            { name: "Add", url: "add_shortcut" }
        ];

        window.onload = () => {
            if(localStorage.getItem('hub_host')) {
                document.getElementById('host-url').value = localStorage.getItem('hub_host');
                document.getElementById('remember-host').checked = true;
            }
            if(localStorage.getItem('hub_user')) {
                document.getElementById('username').value = localStorage.getItem('hub_user');
                document.getElementById('password').value = localStorage.getItem('hub_pass');
                document.getElementById('remember-me').checked = true;
            }
            renderBookmarks();
            renderShortcuts();
        };

        // --- 1. USER ISOLATION ENGINE ---
        // Backs up the browser's IndexedDB (where UV stores logins) to local storage under the user's name
        function isolateProfileData(username, action) {
            return new Promise((resolve) => {
                const req = indexedDB.open('uv-storage');
                req.onsuccess = (e) => {
                    const db = e.target.result;
                    if (action === 'backup') {
                        try {
                            const tx = db.transaction('uv-cookies', 'readonly');
                            const store = tx.objectStore('uv-cookies');
                            const allReq = store.getAll();
                            allReq.onsuccess = () => {
                                localStorage.setItem(`hub_idb_${username}`, JSON.stringify(allReq.result));
                                resolve();
                            };
                        } catch(err) { resolve(); } // Fails silently if fresh DB
                    } else if (action === 'wipe') {
                        db.close();
                        indexedDB.deleteDatabase('uv-storage');
                        resolve();
                    }
                };
                req.onerror = () => resolve();
            });
        }

        async function logout() {
            if (currentUserId) {
                // Save specific user data, then wipe the active database so the next user can't see it
                await isolateProfileData(currentUserId, 'backup');
                await isolateProfileData(null, 'wipe');
            }
            window.location.reload();
        }

        // --- 2. AUTHENTICATION & BOOT ---
        async function auth(action) {
            let hostInput = document.getElementById('host-url').value.trim().replace(/\/$/, "");
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            
            if (!hostInput || !user || !pass) return alert("Fill out all fields.");
            if (!hostInput.startsWith('http')) hostInput = 'https://' + hostInput;
            baseApiUrl = hostInput;

            try {
                const res = await fetch(`${baseApiUrl}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass, action })
                });

                if (res.ok) {
                    currentUserId = user;
                    if (document.getElementById('remember-host').checked) localStorage.setItem('hub_host', hostInput);
                    if (document.getElementById('remember-me').checked) {
                        localStorage.setItem('hub_user', user);
                        localStorage.setItem('hub_pass', pass);
                    }
                    
                    document.getElementById('login-overlay').style.display = 'none';
                    initProxy(baseApiUrl);
                } else {
                    alert((await res.json()).error);
                }
            } catch (err) {
                alert("Failed to connect to Host URL.");
            }
        }

        async function initProxy(hostUrl) {
            if ('serviceWorker' in navigator) {
                await navigator.serviceWorker.register('./sw.js');
                await navigator.serviceWorker.ready; 
            }
            const wssUrl = hostUrl.replace(/^http/, 'ws') + '/wisp/';
            
            const workerUrl = new URL('baremux-worker.js', window.location.href).href;
            const connection = new BareMux.BareMuxConnection(workerUrl);
            
            // FIX: Swapped unpkg to jsDelivr
            await connection.setTransport('https://cdn.jsdelivr.net/npm/@mercuryworkshop/epoxy-transport@2.0.1/dist/index.mjs', [{ wisp: wssUrl }]);
            
            createTab(); 
        }

        // Save profile data every 30 seconds to ensure logins aren't lost
        setInterval(() => {
            if (currentUserId) isolateProfileData(currentUserId, 'backup');
        }, 30000);

        // --- 3. TAB & NAVIGATION SYSTEM ---
        function createTab(initialUrl = '') {
            tabCounter++;
            const tabId = 'tab_' + tabCounter;

            const tabBtn = document.createElement('div');
            tabBtn.className = 'tab-btn';
            tabBtn.id = 'btn_' + tabId;
            tabBtn.innerHTML = `Tab ${tabCounter} <div class="close-tab" onclick="closeTab('${tabId}', event)">×</div>`;
            tabBtn.onclick = () => switchTab(tabId);

            const iframe = document.createElement('iframe');
            iframe.id = 'iframe_' + tabId;
            iframe.className = 'proxy-iframe';
            iframe.allow = "cross-origin-isolated; fullscreen; keyboard-map"; 
            
            document.getElementById('tab-bar').insertBefore(tabBtn, document.getElementById('add-tab'));
            document.getElementById('browser-wrapper').appendChild(iframe);

            tabs.push({ id: tabId, btn: tabBtn, iframe: iframe, currentUrl: initialUrl });
            switchTab(tabId);
            
            if(initialUrl) navigateActiveTab(initialUrl);
        }

        function switchTab(tabId) {
            activeTabId = tabId;
            const activeTabData = tabs.find(t => t.id === tabId);
            
            tabs.forEach(t => {
                t.btn.classList.toggle('active', t.id === tabId);
                t.iframe.classList.toggle('active', t.id === tabId && t.currentUrl !== '');
            });

            document.getElementById('home-screen').classList.toggle('active', activeTabData.currentUrl === '');
            document.getElementById('home-search').focus();
        }

        function closeTab(tabId, event) {
            event.stopPropagation();
            const tabIndex = tabs.findIndex(t => t.id === tabId);
            if (tabIndex === -1) return;

            tabs[tabIndex].btn.remove();
            tabs[tabIndex].iframe.remove();
            tabs.splice(tabIndex, 1);

            if (tabs.length > 0 && activeTabId === tabId) switchTab(tabs[tabs.length - 1].id);
            else if (tabs.length === 0) activeTabId = null;
        }

        function handleHomeSearch(e) {
            if (e.key === 'Enter') {
                navigateActiveTab(e.target.value);
                e.target.value = '';
            }
        }

        function navigateActiveTab(input) {
            if (!activeTabId) createTab(input);
            input = input.trim();
            if (input.includes('.') && !input.includes(' ')) {
                input = input.startsWith('http') ? input : 'https://' + input;
            } else {
                input = 'https://duckduckgo.com/?q=' + encodeURIComponent(input);
            }
            
            const activeTabData = tabs.find(t => t.id === activeTabId);
            activeTabData.currentUrl = input;
            activeTabData.iframe.src = __uv$config.prefix + __uv$config.encodeUrl(input);
            
            switchTab(activeTabId);
        }

        // --- 4. BOOKMARKS & SHORTCUTS ---
        function renderBookmarks() {
            const bar = document.getElementById('bookmark-bar');
            bar.innerHTML = '<span class="add-bookmark" onclick="addBookmark()">+ Add Bookmark</span>';
            bookmarks.forEach(b => {
                const el = document.createElement('a');
                el.className = 'bookmark-item';
                el.innerHTML = `★ ${b.name}`;
                el.onclick = () => navigateActiveTab(b.url);
                bar.appendChild(el);
            });
        }

        function renderShortcuts() {
            const grid = document.getElementById('shortcuts-grid');
            grid.innerHTML = '';
            shortcuts.forEach(s => {
                const el = document.createElement('div');
                el.className = 'shortcut';
                if (s.url === 'add_shortcut') {
                    el.innerHTML = `<div class="shortcut-icon">+</div><span>Add Shortcut</span>`;
                    el.onclick = addShortcut;
                } else {
                    el.innerHTML = `<div class="shortcut-icon">${s.name.charAt(0).toUpperCase()}</div><span>${s.name}</span>`;
                    el.onclick = () => navigateActiveTab(s.url);
                }
                grid.appendChild(el);
            });
        }

        function addBookmark() {
            const name = prompt("Enter Bookmark Name:");
            const url = prompt("Enter Bookmark URL:");
            if (name && url) {
                bookmarks.push({ name, url });
                localStorage.setItem('hub_bookmarks', JSON.stringify(bookmarks));
                renderBookmarks();
            }
        }

        function addShortcut() {
            const name = prompt("Enter Shortcut Name:");
            const url = prompt("Enter Shortcut URL:");
            if (name && url) {
                shortcuts.splice(shortcuts.length - 1, 0, { name, url });
                localStorage.setItem('hub_shortcuts', JSON.stringify(shortcuts));
                renderShortcuts();
            }
        }
    </script>
</body>
</html>
